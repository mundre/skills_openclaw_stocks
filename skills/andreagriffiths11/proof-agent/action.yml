name: 'Proof Agent'
description: 'Adversarial verification for AI-generated code using GitHub Copilot'
author: 'Andrea Griffiths'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  github-token:
    description: 'GitHub token for authentication (defaults to GITHUB_TOKEN)'
    required: false
    default: ${{ github.token }}
  base-ref:
    description: 'Git ref to compare against (e.g., origin/main, HEAD~1)'
    required: false
    default: 'origin/main'
  block-on-fail:
    description: 'Exit with code 1 if verification fails (blocks PR merge)'
    required: false
    default: 'true'
  post-comment:
    description: 'Post verification result as PR comment'
    required: false
    default: 'true'
  comment-mode:
    description: 'Comment format: full, summary, or collapse (default: collapse)'
    required: false
    default: 'collapse'
  max-comment-length:
    description: 'Maximum comment length in characters (default: 2000)'
    required: false
    default: '2000'

outputs:
  verdict:
    description: 'Verification verdict (PASS, FAIL, or PARTIAL)'
    value: ${{ steps.verify.outputs.verdict }}
  summary:
    description: 'Verification summary (full text)'
    value: ${{ steps.verify.outputs.summary }}

runs:
  using: 'composite'
  steps:
    - name: Generate verification prompt
      id: prompt
      shell: bash
      run: |
        bash ${{ github.action_path }}/scripts/verify.sh "${{ inputs.base-ref }}" > verification_prompt.txt
        echo "Generated verification prompt ($(wc -l < verification_prompt.txt) lines)"
    
    - name: Run verification via GitHub Copilot
      id: verify
      shell: bash
      run: bash ${{ github.action_path }}/entrypoint.sh
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_BLOCK_ON_FAIL: ${{ inputs.block-on-fail }}
        INPUT_POST_COMMENT: ${{ inputs.post-comment }}
        INPUT_COMMENT_MODE: ${{ inputs.comment-mode }}
        INPUT_MAX_COMMENT_LENGTH: ${{ inputs.max-comment-length }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
