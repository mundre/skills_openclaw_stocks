version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: weryai-video-generator
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the weryai-video-generator skill to make a WeryAI text-to-video clip with the default Seedance 2.0 model."
  - id: implicit-domain
    should_trigger: true
    prompt: "Animate this https://example.com/a.png with WeryAI image-to-video and wait for the final video URLs."
  - id: first-last-frame
    should_trigger: true
    prompt: "Generate a WeryAI video that transitions from this first frame to this last frame while keeping the same character."
  - id: multi-image-storyboard
    should_trigger: true
    prompt: "Turn these storyboard frames into a WeryAI video and keep Seedance 2.0 unless I ask for another model."
  - id: negative-control
    should_trigger: false
    prompt: "Rewrite this Python module for PEP8 only."
outcome_tests:
  - id: package-layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "scripts/submit-text-video.js"
  - id: optional-quality
    type: llm_rubric
    rubric: |
      Correctly recognizes text, image, first/last-frame, and multi-image video intents; defaults to Seedance 2.0 with sensible video parameters; validates payloads; uses dry-run when appropriate; and never invents unsupported model fields.
