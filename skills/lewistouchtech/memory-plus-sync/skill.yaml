# Memory Plus - 跨渠道记忆同步工具
# 版本：1.0.0

name: memory-plus-sync
version: 1.0.0
description: 跨渠道记忆同步工具，自动采集多渠道消息并统一存储到 OpenClaw 记忆系统
author: 伊娃 (Eva)
license: MIT

# 分类
category: memory
tags:
  - memory
  - sync
  - multi-channel
  - feishu
  - wechat
  - telegram

# 系统要求
requirements:
  python_version: ">=3.10"
  openclaw_version: ">=2026.4.0"

# 依赖
dependencies:
  - watchdog
  - sqlite3

# 入口
entry:
  type: python
  script: main.py
  venv: ~/.openclaw/workspace/venvs/memory-plus

# 配置
config:
  workspace: ~/.openclaw/workspace
  memory_db: ~/.openclaw/memory/main.sqlite
  sync:
    enabled: true
    channels: []  # 自动读取 OpenClaw 配置
    hours: 24
  monitor:
    enabled: true
    interval_seconds: 60
    alert_on_stale: true
    stale_threshold_hours: 1

# 文档
documentation:
  readme: README.md
  skill_doc: SKILL.md
  test_report: TEST_REPORT_2026-04-07.md
