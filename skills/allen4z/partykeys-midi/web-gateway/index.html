<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Hardware Gateway</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { margin-top: 0; color: #333; }
        button {
            background: #1890ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #40a9ff; }
        button:disabled { background: #d9d9d9; cursor: not-allowed; }
        .status {
            padding: 12px;
            border-radius: 4px;
            margin: 16px 0;
            font-size: 14px;
        }
        .status.disconnected { background: #fff1f0; color: #cf1322; }
        .status.connected { background: #f6ffed; color: #52c41a; }
        .log {
            background: #fafafa;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            margin-top: 16px;
        }
        .log-item { margin: 4px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎹 Music Hardware Gateway</h1>

        <div id="status" class="status disconnected">
            ❌ 未连接
        </div>

        <button id="connectBtn" onclick="connectDevice()">连接设备</button>
        <button id="disconnectBtn" onclick="disconnectDevice()" disabled>断开连接</button>
        <button id="testBtn" onclick="testLightKeys()" disabled>测试点亮按键</button>
        <button id="rawBtn" onclick="testRawCommand()" disabled>测试原始命令</button>

        <div class="log" id="log"></div>
    </div>

    <script src="ble-client.js"></script>
    <script src="ws-client.js"></script>
    <script src="gateway-server.js"></script>
</body>
</html>
